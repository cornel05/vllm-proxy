services:
  # ── Mock vLLM (remove in production, point to real vLLM) ──
  mock-vllm:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "30154:30154"
    profiles:
      - test

  # ── FastAPI Proxy ─────────────────────────────────────────
  app:
    build: .
    environment:
      - VLLM_PROXY_VLLM_BASE_URL=http://mock-vllm:30154  # Change to real vLLM URL in production
      - VLLM_PROXY_REQUEST_TIMEOUT=120
    depends_on:
      - mock-vllm
    restart: unless-stopped

  # ── Nginx Gateway ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
