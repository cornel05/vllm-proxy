upstream fastapi {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Pass real client IP to FastAPI
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;

    # Proxy all /v1/* requests (OpenAI-compatible API)
    location /v1/ {
        proxy_pass http://fastapi;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Expose FastAPI /metrics for Prometheus (internal only)
    location /metrics {
        proxy_pass http://fastapi;
    }

    # Health check
    location /health {
        proxy_pass http://fastapi;
    }

    # Nginx status (optional, for debugging)
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }
}
