<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vLLM Proxy — Test Console</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181b24;
    --border: #2a2f3a;
    --text: #e4e7ee;
    --muted: #8a91a0;
    --accent: #5b8def;
    --accent-hover: #4a7ce0;
    --ok: #3fb950;
    --err: #f85149;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 64px; }
  header { margin-bottom: 28px; }
  h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 13px; }
  .sub code { font-family: var(--mono); color: var(--accent); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 140px; }

  input, textarea {
    width: 100%;
    background: #0f1117;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 90px; font-family: var(--mono); font-size: 13px; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }

  .actions { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .ghost:hover { background: #1f232e; color: var(--text); }

  .status { font-size: 13px; margin-left: auto; font-family: var(--mono); }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }

  .out-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  pre {
    background: #0f1117;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 14px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 13px;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 40px;
  }
  .stats { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px; font-size: 13px; font-family: var(--mono); color: var(--muted); }
  .stats b { color: var(--text); font-weight: 600; }
  .empty { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>vLLM Proxy — Test Console</h1>
    <div class="sub">Sends requests through the proxy at <code id="origin"></code> → tracked per-IP in Grafana</div>
  </header>

  <div class="panel">
    <div class="row">
      <div>
        <label for="model">Model</label>
        <input id="model" value="phi" />
      </div>
      <div>
        <label for="maxtok">Max tokens</label>
        <input id="maxtok" type="number" value="128" />
      </div>
      <div>
        <label for="temp">Temperature</label>
        <input id="temp" type="number" step="0.1" value="0.7" />
      </div>
    </div>
    <div style="margin-top:14px">
      <label for="prompt">Prompt</label>
      <textarea id="prompt">What is 2 + 2? Answer briefly.</textarea>
    </div>
    <div class="actions">
      <button id="send">Send request</button>
      <button id="burst" class="ghost">Send ×5 (generate metrics)</button>
      <span id="status" class="status"></span>
    </div>
  </div>

  <div class="panel">
    <div class="out-label">
      <label style="margin:0">Response</label>
      <a href="/metrics" target="_blank" class="sub" style="text-decoration:none">view /metrics →</a>
    </div>
    <pre id="output" class="empty">No request sent yet.</pre>
    <div class="stats" id="stats"></div>
  </div>
</div>

<script>
  document.getElementById('origin').textContent = location.host;
  const $ = (id) => document.getElementById(id);
  const statusEl = $('status');

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status' + (cls ? ' ' + cls : '');
  }

  function buildBody() {
    return {
      model: $('model').value.trim(),
      messages: [{ role: 'user', content: $('prompt').value }],
      max_tokens: parseInt($('maxtok').value) || 128,
      temperature: parseFloat($('temp').value) || 0.7,
      stream: false
    };
  }

  async function sendOne(silent) {
    const t0 = performance.now();
    try {
      const res = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildBody())
      });
      const ms = Math.round(performance.now() - t0);
      const data = await res.json();

      if (!silent) {
        const content = data?.choices?.[0]?.message?.content ?? JSON.stringify(data, null, 2);
        $('output').textContent = content;
        $('output').className = '';

        const u = data?.usage || {};
        $('stats').innerHTML =
          `<span>status <b>${res.status}</b></span>` +
          `<span>latency <b>${ms}ms</b></span>` +
          `<span>prompt_tokens <b>${u.prompt_tokens ?? '—'}</b></span>` +
          `<span>completion_tokens <b>${u.completion_tokens ?? '—'}</b></span>`;
      }
      return res.ok;
    } catch (e) {
      if (!silent) {
        $('output').textContent = 'Error: ' + e.message;
        $('output').className = '';
        $('stats').innerHTML = '';
      }
      return false;
    }
  }

  $('send').onclick = async () => {
    $('send').disabled = true;
    setStatus('sending…');
    const ok = await sendOne(false);
    setStatus(ok ? 'done' : 'failed', ok ? 'ok' : 'err');
    $('send').disabled = false;
  };

  $('burst').onclick = async () => {
    $('burst').disabled = true;
    for (let i = 1; i <= 5; i++) {
      setStatus(`sending ${i}/5…`);
      await sendOne(i !== 5);
    }
    setStatus('5 requests done', 'ok');
    $('burst').disabled = false;
  };
</script>
</body>
</html>
