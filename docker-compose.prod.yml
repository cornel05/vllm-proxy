# Production docker-compose — points to real vLLM
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    build: .
    environment:
      - VLLM_PROXY_VLLM_BASE_URL=http://172.16.28.63:30154  # ← Real vLLM
      - VLLM_PROXY_REQUEST_TIMEOUT=120
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
